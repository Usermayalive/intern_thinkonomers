<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Services | The Rolling Plate Creatives</title>
    <meta name="description" content="Data-driven marketing strategies that deliver real business growth and audience engagement.">
    <!-- Same head content -->
    <style>
        .marketing-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }
        .metric-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .metric-value {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- Same header/navigation -->

    <!-- SERVICE HERO -->
    <section class="hero service-hero">
        <h2>Marketing <span class="rolling-text">Strategy</span></h2>
        <p>Data-driven strategies that deliver real business growth and audience engagement.</p>
        <button class="cta-button">Grow Your Business</button>
    </section>

    <!-- METRICS SHOWCASE -->
    <section class="services">
        <div class="container">
            <div class="marketing-metrics">
                <div class="metric-card">
                    <div class="metric-value">87%</div>
                    <p>of our clients see increased ROI within 3 months</p>
                </div>
                <div class="metric-card">
                    <div class="metric-value">3.5x</div>
                    <p>average increase in engagement</p>
                </div>
                <div class="metric-card">
                    <div class="metric-value">42%</div>
                    <p>reduction in customer acquisition costs</p>
                </div>
            </div>
        </div>
    </section>

    <!-- MARKETING SERVICES -->
    <section class="services">
        <div class="container">
            <h3>Our Marketing Solutions</h3>
            <div class="services-grid">
                <!-- Marketing service cards -->
            </div>
        </div>
    </section>

    <!-- Same footer -->
</body>
</html>
