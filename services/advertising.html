<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertising Services | The Rolling Plate Creatives</title>
    <meta name="description" content="Breakthrough creative campaigns that cut through the noise and deliver exceptional results.">
    <!-- Same head content -->
    <style>
        .ad-campaign {
            position: relative;
            margin: 50px 0;
            border-radius: 20px;
            overflow: hidden;
        }
        .campaign-overlay {
            position: absolute;
            bottom: 0;
            padding: 30px;
            color: white;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
    </style>
</head>
<body>
    <!-- Same header/navigation -->

    <!-- HERO WITH VIDEO BACKGROUND -->
    <section class="hero">
        <video autoplay muted loop class="hero-video">
            <source src="../assets/videos/advertising-hero.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h2>Advertising <span class="rolling-text">That Works</span></h2>
            <p>Breakthrough creative campaigns that cut through the noise and deliver exceptional results.</p>
        </div>
    </section>

    <!-- CAMPAIGN SHOWCASE -->
    <section class="services">
        <div class="container">
            <h3>Our Advertising Approach</h3>
            <div class="ad-campaign">
                <img src="../assets/images/ad-campaign.jpg" alt="Sample Advertising Campaign">
                <div class="campaign-overlay">
                    <h4>Recent Campaign</h4>
                    <p>Increased brand awareness by 210%</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Same footer -->
</body>
</html>
